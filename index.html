<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' https://lh3.googleusercontent.com data:; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src 'self' https://*.supabase.co https://*.supabase.in; object-src 'none'; base-uri 'self'; form-action 'self'"
    >
    <meta name="description" content="S-parks V5 AIGC 创作者素材平台原型，升级为支持真实账号登录与三角色个人主页。">
    <title>S-parks V5 | Role-based Creator Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css?v=sparks-v5.0.2">
  </head>
  <body>
    <canvas id="particle-canvas" aria-hidden="true"></canvas>
    <div class="ambient-grid" aria-hidden="true"></div>

    <header class="site-header" data-elevated="false">
      <a class="brand" href="#home" aria-label="S-parks 首页">
        <span class="brand-mark"></span>
        <span>S-parks</span>
      </a>

      <button class="icon-button mobile-menu-button" type="button" aria-label="打开导航" aria-expanded="false" aria-controls="site-nav" data-menu-button>
        <span class="material-symbols-outlined" aria-hidden="true">menu</span>
      </button>

      <nav id="site-nav" class="site-nav" aria-label="主导航" data-site-nav></nav>

      <div class="header-actions">
        <label class="search-shell" aria-label="搜索 S-parks 内容">
          <span class="material-symbols-outlined" aria-hidden="true">search</span>
          <input id="site-search" type="search" placeholder="搜索素材 / 创作者 / 帮助">
        </label>
        <a class="icon-button" href="#upload" aria-label="上传素材">
          <span class="material-symbols-outlined" aria-hidden="true">upload</span>
        </a>
        <a class="icon-button" href="#auth" aria-label="进入个人主页" data-profile-link>
          <span class="material-symbols-outlined" aria-hidden="true">person</span>
        </a>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>

    <footer class="site-footer">
      <div>
        <strong>S-parks</strong>
        <span>© 2024 S-parks AIGC. Prototype for commercial review.</span>
      </div>
      <nav aria-label="页脚导航">
        <a href="#support">隐私政策</a>
        <a href="#support">服务条款</a>
        <a href="#support">Cookie 政策</a>
        <a href="#support">联系我们</a>
      </nav>
    </footer>

    <script src="./assets/js/config.js?v=sparks-v5.0.2"></script>
    <script src="./assets/js/content.js?v=sparks-v5.0.2"></script>
    <script src="./assets/js/utils.js?v=sparks-v5.0.2"></script>
    <script src="./assets/js/renderers.js?v=sparks-v5.0.2"></script>
    <script src="./assets/js/router.js?v=sparks-v5.0.2"></script>
    <script src="./assets/js/particles.js?v=sparks-v5.0.2"></script>
    <script src="./assets/js/auth.js?v=sparks-v5.0.2"></script>
    <script src="./assets/js/app.js?v=sparks-v5.0.2"></script>
  </body>
</html>
